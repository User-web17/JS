<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <form>

        <h2>My Profile</h2>

        <div class="form-group">
            <label>Email</label>
            <p id="email"></p>
        </div>

        <div class="form-group">
            <label>First Name</label>
            <p id="firstName"></p>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <p id="lastName"></p>
        </div>

        <div class="form-group">
            <label>Birth Year</label>
            <p id="birthYear"></p>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <p id="gender"></p>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <p id="phone"></p>
        </div>

        <div class="form-group">
            <label>Skype</label>
            <p id="skype"></p>
        </div>

        <button type="button" id="editBtn">
            Edit
        </button>

        <button type="button" class="exit-btn" id="exitBtn">
            Exit
        </button>

    </form>

</div>

<script src="account.js"></script>

</body>
</html>
